name: python-native-crypto

on:
  push:
    paths:
      - "python/native/**"
      - ".github/workflows/python-native.yml"
  pull_request:
    paths:
      - "python/native/**"
      - ".github/workflows/python-native.yml"
  workflow_dispatch:
  release:
    types: [published]

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: python/native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - run: python -m pip install --upgrade pip maturin
      - run: rustc --version
      - run: cargo check
      - run: maturin build --interpreter python
      - uses: actions/upload-artifact@v4
        with:
          name: dilithia-sdk-python-crypto-${{ matrix.os }}-py${{ matrix.python-version }}
          path: python/native/target/wheels/*

  package:
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: python/native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - run: python -m pip install --upgrade pip maturin
      - run: maturin build --interpreter python
      - uses: actions/upload-artifact@v4
        with:
          name: dilithia-sdk-python-crypto-package-${{ matrix.os }}-py${{ matrix.python-version }}
          path: python/native/target/wheels/*

  publish:
    if: github.event_name == 'release'
    needs: [package]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python/native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip twine
      - uses: actions/download-artifact@v4
        with:
          pattern: dilithia-sdk-python-crypto-package-*
          path: python/native/dist
          merge-multiple: true
      - run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
