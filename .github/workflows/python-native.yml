name: python-native-crypto

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: python/native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - run: python -m pip install --upgrade pip maturin
      - run: rustc --version
      - run: cargo check
      - run: maturin build --interpreter python
      - uses: actions/upload-artifact@v4
        with:
          name: dilithia-sdk-python-crypto-${{ matrix.os }}-py${{ matrix.python-version }}
          path: python/native/target/wheels/*

  package:
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: python/native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - run: python -m pip install --upgrade pip maturin
      - run: maturin build --interpreter python
      - uses: actions/upload-artifact@v4
        with:
          name: dilithia-sdk-python-crypto-package-${{ matrix.os }}-py${{ matrix.python-version }}
          path: python/native/target/wheels/*
