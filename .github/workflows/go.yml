name: go-sdk

on:
  push:
    paths:
      - "go/**"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "go/**"
      - ".github/workflows/go.yml"
  workflow_dispatch:
  release:
    types: [published]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go test ./...
        working-directory: go
      - run: git archive --format=tar.gz --output go-sdk-source.tgz HEAD:go
        working-directory: .
      - uses: actions/upload-artifact@v4
        with:
          name: go-sdk-${{ matrix.os }}-go${{ matrix.go-version }}
          path: go-sdk-source.tgz

  release-notes:
    if: github.event_name == 'release'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          {
            echo "# Go module release";
            echo;
            echo "Module path target: github.com/dilithia/languages-sdk/go";
            echo "GitHub release tags are the publication mechanism for Go consumers and pkg.go.dev.";
          } > go-release-notes.md
      - uses: actions/upload-artifact@v4
        with:
          name: go-release-notes
          path: go-release-notes.md

  go-module-tag:
    if: github.event_name == 'release'
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Go sub-module tag
        run: |
          VERSION="${GITHUB_REF_NAME}"
          GO_TAG="go/${VERSION}"
          if git ls-remote --tags origin "$GO_TAG" | grep -q "$GO_TAG"; then
            echo "Tag $GO_TAG already exists on remote, skipping"
          else
            git tag "$GO_TAG"
            git push origin "$GO_TAG"
            echo "Created and pushed tag $GO_TAG"
          fi

  release-assets:
    if: github.event_name == 'release'
    needs: [test, release-notes, go-module-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: go-sdk-ubuntu-latest-go1.23
          path: go-release
      - uses: actions/download-artifact@v4
        with:
          name: go-release-notes
          path: go-release
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            go-release/go-sdk-source.tgz
            go-release/go-release-notes.md
