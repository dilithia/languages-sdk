name: go-sdk

on:
  push:
    paths:
      - "go/**"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "go/**"
      - ".github/workflows/go.yml"
  workflow_dispatch:
  release:
    types: [published]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go test ./...
        working-directory: go
      - run: tar -czf go-sdk-source.tgz .
        working-directory: go
      - uses: actions/upload-artifact@v4
        with:
          name: go-sdk-${{ matrix.os }}-go${{ matrix.go-version }}
          path: go/go-sdk-source.tgz

  release-notes:
    if: github.event_name == 'release'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          {
            echo "# Go module release";
            echo;
            echo "Module path target: github.com/dilithia/languages-sdk/go";
            echo "GitHub release tags are the publication mechanism for Go consumers and pkg.go.dev.";
          } > go-release-notes.md
      - uses: actions/upload-artifact@v4
        with:
          name: go-release-notes
          path: go-release-notes.md
