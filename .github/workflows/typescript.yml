name: typescript-sdk

on:
  push:
    paths:
      - "typescript/**"
      - "!typescript/native/**"
      - ".github/workflows/typescript.yml"
  pull_request:
    paths:
      - "typescript/**"
      - "!typescript/native/**"
      - ".github/workflows/typescript.yml"
  workflow_dispatch:
  release:
    types: [published]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22]
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node --version
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk-${{ matrix.os }}-node${{ matrix.node }}
          path: typescript/*.tgz

  publish:
    if: github.event_name == 'release'
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
