name: typescript-native-crypto

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20]
    defaults:
      run:
        working-directory: typescript/native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - run: rustc --version
      - run: cargo check
      - run: npm run build:native
      - uses: actions/upload-artifact@v4
        with:
          name: dilithia-sdk-node-crypto-${{ matrix.os }}
          path: |
            typescript/native/*.node
            typescript/native/*.tgz

  package:
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: typescript/native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - run: npm run build:native
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: dilithia-sdk-node-crypto-package-${{ matrix.os }}
          path: typescript/native/*.tgz
