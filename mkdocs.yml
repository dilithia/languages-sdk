site_name: Dilithia SDK Documentation
site_description: Official documentation for the Dilithia Language SDKs monorepo
repo_url: https://github.com/dilithia/languages-sdk
repo_name: dilithia/languages-sdk

theme:
  name: material
  palette:
    - scheme: default
      primary: orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
    - Crypto Adapter: api/crypto.md
    - Types: api/types.md
    - RPC Client: api/client.md
    - ZK Adapter: api/zk.md
  - Examples:
    - examples/index.md
    - TypeScript: examples/typescript.md
    - Python: examples/python.md
    - Rust: examples/rust.md
    - Go: examples/go.md
    - Java: examples/java.md
  - Guides:
    - Smart Contracts: guides/smart-contracts.md
    - ZK & Shielded Pool: guides/zk-shielded.md
    - Signing Transactions: guides/signing-transactions.md
    - Sync vs Async: guides/sync-async.md
    - Native Bridges: guides/native-bridges.md
  - Reference:
    - Architecture: reference/architecture.md
